<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Waffli — Banner del repositorio GitHub</title>
<desc>Banner con fondo color Cocoa oscuro, patrón de waffle, logo y texto de la app Waffli</desc>
<defs>
  <pattern id="waffleGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="28" height="28" fill="none"/>
    <rect x="2" y="2" width="11" height="11" rx="2" fill="#C86B4A" opacity="0.13"/>
    <rect x="15" y="2" width="11" height="11" rx="2" fill="#C86B4A" opacity="0.08"/>
    <rect x="2" y="15" width="11" height="11" rx="2" fill="#C86B4A" opacity="0.08"/>
    <rect x="15" y="15" width="11" height="11" rx="2" fill="#C86B4A" opacity="0.13"/>
  </pattern>
  <radialGradient id="glowLeft" cx="20%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#D88C3A" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#6B4A3A" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowRight" cx="85%" cy="40%" r="45%">
    <stop offset="0%" stop-color="#E6C36A" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#6B4A3A" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="680" height="280" fill="#3D2618"/>
<rect width="680" height="280" fill="url(#waffleGrid)"/>
<rect width="680" height="280" fill="url(#glowLeft)"/>
<rect width="680" height="280" fill="url(#glowRight)"/>
<rect x="0" y="0" width="680" height="3" fill="#D88C3A" opacity="0.7"/>
<rect x="60" y="88" width="104" height="104" rx="22" fill="#6B4A3A"/>
